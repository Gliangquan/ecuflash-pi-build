name: build-desktop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ECUFlash-windows
            output_file: dist/ECUFlash-windows.exe
          - os: macos-latest
            artifact_name: ECUFlash-macos
            output_file: dist/ECUFlash-macos.zip
          - os: ubuntu-latest
            artifact_name: ECUFlash-linux
            output_file: dist/ECUFlash-linux.tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Linux runtime libs
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-xinerama0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyQt5 pyinstaller Pillow

      - name: Build Windows single-file exe
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          python - <<'PY'
          from PIL import Image
          img = Image.open('icon.jpg').convert('RGBA')
          img.save('icon.ico', sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])
          PY
          pyinstaller --noconfirm --clean --onefile --windowed --name ECUFlash --icon icon.ico --hidden-import PyQt5.sip --add-data "icon;icon" --add-data "icon.jpg;." frontend.py

      - name: Build macOS/Linux package
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --noconfirm --clean ECUFlash.spec

      - name: Pack macOS artifact
        if: matrix.os == 'macos-latest'
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/ECUFlash.app dist/ECUFlash-macos.zip

      - name: Pack Linux artifact
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czf dist/ECUFlash-linux.tar.gz -C dist ECUFlash

      - name: Prepare Windows artifact
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cp dist/ECUFlash.exe dist/ECUFlash-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_file }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ECUFlash-windows
          path: release-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ECUFlash-macos
          path: release-assets

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ECUFlash-linux
          path: release-assets

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: 最新桌面版构建
          prerelease: true
          make_latest: true
          overwrite_files: true
          generate_release_notes: true
          files: |
            release-assets/ECUFlash-windows.exe
            release-assets/ECUFlash-macos.zip
            release-assets/ECUFlash-linux.tar.gz
