name: build-desktop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ECUFlash-windows
            output_file: dist/ECUFlash-windows.zip
          - os: macos-latest
            artifact_name: ECUFlash-macos
            output_file: dist/ECUFlash-macos.zip
          - os: ubuntu-latest
            artifact_name: ECUFlash-linux
            output_file: dist/ECUFlash-linux.tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Linux runtime libs
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-xinerama0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install PyQt5 pyinstaller

      - name: Build desktop package
        run: |
          pyinstaller --noconfirm --clean --windowed --name ECUFlash --hidden-import PyQt5.sip frontend.py

      - name: Pack Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/ECUFlash/* -DestinationPath dist/ECUFlash-windows.zip -Force

      - name: Pack macOS artifact
        if: matrix.os == 'macos-latest'
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/ECUFlash.app dist/ECUFlash-macos.zip

      - name: Pack Linux artifact
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czf dist/ECUFlash-linux.tar.gz -C dist ECUFlash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_file }}
