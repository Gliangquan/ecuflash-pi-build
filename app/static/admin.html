<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECU 功能授权运营台</title>
  <link rel="stylesheet" href="/static/vendor/arco.css" />
  <style>
    :root {
      --bg-page: #f7f8fa;
      --bg-card: #ffffff;
      --border: #e5e7eb;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --brand: #5468ff;
      --brand-soft: #eef1ff;
      --success: #12b76a;
      --warning: #f79009;
      --danger: #f04438;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
    }
    #app { min-height: 100vh; }
    .shell { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }
    .sidebar {
      background: #fff;
      border-right: 1px solid var(--border);
      padding: 20px 16px;
    }
    .brand {
      font-size: 18px;
      font-weight: 700;
      padding: 8px 12px 20px;
    }
    .nav-item {
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 6px;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .nav-item.active { background: var(--brand-soft); color: var(--brand); font-weight: 600; }
    .main { padding: 24px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .page-title { font-size: 24px; font-weight: 700; }
    .page-subtitle { margin-top: 6px; color: var(--text-secondary); font-size: 13px; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; margin-bottom: 20px; }
    .content-grid { display: grid; gap: 16px; }
    .two-col { grid-template-columns: 1.1fr 1fr; }
    .three-col { grid-template-columns: 280px 1fr 340px; align-items: start; }
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
    }
    .panel-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
    .stat-value { font-size: 28px; font-weight: 700; margin: 10px 0 6px; }
    .muted { color: var(--text-secondary); font-size: 13px; }
    .user-list { display: grid; gap: 10px; max-height: 620px; overflow: auto; }
    .user-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      background: #fff;
    }
    .user-card.active { border-color: var(--brand); background: var(--brand-soft); }
    .user-name { font-weight: 600; }
    .meta-row { display: flex; gap: 8px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
    .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
    .tree-scroll { max-height: 620px; overflow: auto; border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
    .section-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .footer-actions { display: flex; gap: 10px; margin-top: 18px; }
    .table-like { display: grid; gap: 10px; }
    .list-line { display: flex; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f2f5; }
    .list-line:last-child { border-bottom: none; }
    .chip-wrap { display: flex; gap: 8px; flex-wrap: wrap; }
    .asset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .asset-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }
    .asset-cover {
      height: 156px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .asset-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .asset-placeholder {
      color: var(--text-secondary);
      font-size: 13px;
    }
    .asset-body {
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .asset-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .asset-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
    }
    .asset-summary {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.6;
      min-height: 42px;
    }
    .asset-meta {
      display: grid;
      gap: 4px;
      color: var(--text-secondary);
      font-size: 12px;
    }
    .asset-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .preview-box {
      width: 180px;
      height: 180px;
      border-radius: 18px;
      background: #f3f4f6;
      border: 1px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .preview-hint {
      color: var(--text-secondary);
      font-size: 13px;
      text-align: center;
      padding: 0 16px;
      line-height: 1.6;
    }
    @media (max-width: 1280px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .three-col { grid-template-columns: 1fr; }
      .shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/static/vendor/vue.global.prod.js"></script>
  <script src="/static/vendor/arco-vue.min.js"></script>
  <script>
    const { createApp, ref, reactive, computed, onMounted } = Vue;
    const { Message } = ArcoVue;

    createApp({
      setup() {
        const token = ref(localStorage.getItem('admin_token') || '');
        const currentUser = ref(null);
        const activeMenu = ref('dashboard');
        const loading = ref(false);
        const dashboard = reactive({ summary: {}, recent_users: [], recent_logs: [] });
        const users = ref([]);
        const logs = ref([]);
        const loginForm = reactive({ phone: 'admin', password: 'admin1234' });
        const createForm = reactive({ phone: '', name: '', password: '', status: 'enabled' });
        const resetPasswordForm = reactive({ password: '' });
        const purchaseForm = reactive({ title: '', message: '', qr_code_url: '', payment_qr_preview: '', contact: '', update_notice: '', force_update: '0', latest_version: '', latest_download_url: '', allow_passwordless_register: '0', registration_requires_approval: '1', virtual_downloads_json: '[]', wiring_guides_json: '[]' });
        const virtualAssets = ref([]);
        const assetVisible = ref(false);
        const assetSubmitting = ref(false);
        const assetForm = reactive({ id: '', title: '', category: 'manual', summary: '', keywords: '', image_url: '', download_text: '立即下载', sort_order: 0, is_enabled: 1, file_name: '', object_key: '', file_url: '', content_type: '', file_size: 0 });
        const wiringGuides = ref([]);
        const wiringGuideSearch = ref('');
        const wiringGuideVisible = ref(false);
        const wiringGuideSubmitting = ref(false);
        const wiringGuideForm = reactive({ id: null, name: '', model: '', car_model: '', keywords: '', description: '', preview_image_url: '', file_name: '', object_key: '', file_url: '', content_type: '', file_size: 0, sort_order: 0, is_enabled: 1 });
        const ecuRules = ref([]);
        const ecuRuleSearch = ref('');
        const selectedEcuRule = ref(null);
        const ecuRuleDetail = ref(null);
        const identifyRuleVisible = ref(false);
        const ecuFunctionVisible = ref(false);
        const ecuVariantVisible = ref(false);
        const ecuPatchVisible = ref(false);
        const editingIdentifyRuleId = ref(null);
        const editingFunctionId = ref(null);
        const editingPatchId = ref(null);
        const identifyRuleForm = reactive({ ecu_model_id: null, addr: '', data_length: '', hex_value: '' });
        const ecuFunctionForm = reactive({ ecu_model_id: null, name: '', success_msg: '', sort_order: 0, is_enabled: 1 });
        const ecuVariantForm = reactive({ function_id: null, identify_hex: '' });
        const ecuPatchForm = reactive({ variant_id: null, seq_no: 1, addr: '', data_length: '', value_hex: '' });
        const learningArticles = ref([]);
        const learningArticleVisible = ref(false);
        const learningArticleSubmitting = ref(false);
        const learningArticleForm = reactive({ id: null, title: '', summary: '', cover_image_url: '', content_html: '', sort_order: 0, is_enabled: 1 });
        const learningArticleImageUploading = ref(false);
        const createVisible = ref(false);
        const resetPasswordVisible = ref(false);
        const resetPasswordUser = ref(null);
        const authUserVisible = ref(false);
        const authUser = ref(null);
        const authForm = reactive({ auth_days: 365 });

        const headers = computed(() => token.value ? { Authorization: 'Bearer ' + token.value } : {});

        const navItems = [
          { key: 'dashboard', label: '仪表盘' },
          { key: 'users', label: '用户管理' },
          { key: 'purchase', label: '开通配置' },
          { key: 'ecu-rules', label: 'ECU规则管理' },
          { key: 'wiring-guides', label: '接线图管理' },
          { key: 'learning-articles', label: '学习资料' },
          { key: 'logs', label: '操作日志' },
        ];

        async function request(path, options = {}) {
          const mergedHeaders = {
            ...headers.value,
            ...(options.headers || {}),
          };
          if (options.body instanceof FormData) {
            delete mergedHeaders['Content-Type'];
          } else {
            mergedHeaders['Content-Type'] = 'application/json';
          }
          const resp = await fetch(path, {
            ...options,
            headers: mergedHeaders,
          });
          if (!resp.ok) {
            let message = '请求失败';
            try {
              const data = await resp.json();
              message = data.detail || JSON.stringify(data);
            } catch (e) {}
            throw new Error(message);
          }
          return resp.json();
        }

        async function login() {
          loading.value = true;
          try {
            const data = await request('/api/v1/auth/login', {
              method: 'POST',
              body: JSON.stringify({
                ...loginForm,
                device_id: 'admin-web-console',
                device_name: 'Admin Web Console',
              }),
            });
            token.value = data.token;
            localStorage.setItem('admin_token', data.token);
            currentUser.value = data.user;
            Message.success('登录成功');
            await loadAll();
          } catch (err) {
            Message.error(err.message);
          } finally {
            loading.value = false;
          }
        }

        async function loadMe() {
          currentUser.value = await request('/api/v1/auth/me');
        }

        async function loadDashboard() {
          const data = await request('/api/v1/admin/dashboard');
          Object.assign(dashboard, data);
        }

        async function loadUsers() {
          const data = await request('/api/v1/admin/users');
          users.value = data.items;
        }

        async function loadLogs() {
          const data = await request('/api/v1/admin/logs');
          logs.value = data.items;
        }

        async function loadPurchaseConfig() {
          const data = await request('/api/v1/admin/purchase-config');
          purchaseForm.title = data.title || '';
          purchaseForm.message = data.message || '';
          purchaseForm.qr_code_url = data.qr_code_url || '';
          purchaseForm.payment_qr_preview = data.payment_qr_preview || data.qr_code_url || '';
          purchaseForm.contact = data.contact || '';
          purchaseForm.update_notice = data.update_notice || '';
          purchaseForm.force_update = String(data.force_update || '0');
          purchaseForm.latest_version = data.latest_version || '';
          purchaseForm.latest_download_url = data.latest_download_url || '';
          purchaseForm.allow_passwordless_register = String(data.allow_passwordless_register || '0');
          purchaseForm.registration_requires_approval = String(data.registration_requires_approval || '1');
          purchaseForm.virtual_downloads_json = data.virtual_downloads_json || '[]';
          purchaseForm.wiring_guides_json = data.wiring_guides_json || '[]';
          virtualAssets.value = Array.isArray(data.virtual_assets) ? data.virtual_assets : [];
        }

        async function loadWiringGuides() {
          const keyword = wiringGuideSearch.value ? ('?keyword=' + encodeURIComponent(wiringGuideSearch.value)) : '';
          const data = await request('/api/v1/admin/wiring-guides' + keyword);
          wiringGuides.value = data.items || [];
        }

        async function loadLearningArticles() {
          const data = await request('/api/v1/admin/learning-articles');
          learningArticles.value = data.items || [];
        }

        async function loadEcuRules() {
          const data = await request('/api/v1/admin/ecu-rules');
          ecuRules.value = data.items || [];
          if (!selectedEcuRule.value && ecuRules.value.length) {
            selectedEcuRule.value = ecuRules.value[0];
            await loadEcuRuleDetail(selectedEcuRule.value.id);
          }
        }

        async function loadEcuRuleDetail(ecuModelId) {
          if (!ecuModelId) return;
          const data = await request(`/api/v1/admin/ecu-rules/${ecuModelId}`);
          ecuRuleDetail.value = data;
          identifyRuleForm.ecu_model_id = ecuModelId;
          ecuFunctionForm.ecu_model_id = ecuModelId;
        }

        function openIdentifyRuleModal(rule = null) {
          if (!selectedEcuRule.value) {
            Message.warning('请先从左侧选择一个 ECU 型号');
            return;
          }
          editingIdentifyRuleId.value = rule ? rule.id : null;
          identifyRuleForm.ecu_model_id = selectedEcuRule.value.id;
          identifyRuleForm.addr = rule ? rule.addr : '';
          identifyRuleForm.data_length = rule ? rule.data_length : '';
          identifyRuleForm.hex_value = rule ? rule.hex_value : '';
          identifyRuleVisible.value = true;
        }

        function parseNumericInput(value) {
          const text = String(value || '').trim();
          if (!text) return 0;
          return text.toLowerCase().startsWith('0x') ? parseInt(text, 16) : Number(text);
        }

        function normalizeHexText(value) {
          return String(value || '').replace(/\s+/g, '').toUpperCase();
        }

        async function createIdentifyRule() {
          const path = editingIdentifyRuleId.value ? `/api/v1/admin/ecu-rules/identify-rule/${editingIdentifyRuleId.value}` : '/api/v1/admin/ecu-rules/identify-rule';
          const method = editingIdentifyRuleId.value ? 'PUT' : 'POST';
          await request(path, {
            method,
            body: JSON.stringify({
              ecu_model_id: Number(identifyRuleForm.ecu_model_id),
              addr: parseNumericInput(identifyRuleForm.addr),
              data_length: Number(identifyRuleForm.data_length),
              hex_value: normalizeHexText(identifyRuleForm.hex_value),
            }),
          });
          Message.success(editingIdentifyRuleId.value ? '识别规则已更新' : '识别规则已新增');
          identifyRuleVisible.value = false;
          editingIdentifyRuleId.value = null;
          identifyRuleForm.addr = '';
          identifyRuleForm.data_length = '';
          identifyRuleForm.hex_value = '';
          await Promise.all([loadEcuRules(), loadEcuRuleDetail(identifyRuleForm.ecu_model_id), loadLogs()]);
        }

        function openFunctionModal(func = null) {
          if (!selectedEcuRule.value) {
            Message.warning('请先从左侧选择一个 ECU 型号');
            return;
          }
          editingFunctionId.value = func ? func.id : null;
          ecuFunctionForm.ecu_model_id = selectedEcuRule.value.id;
          ecuFunctionForm.name = func ? func.name : '';
          ecuFunctionForm.success_msg = func ? (func.success_msg || '') : '';
          ecuFunctionForm.sort_order = func ? (func.sort_order || 0) : 0;
          ecuFunctionForm.is_enabled = func ? (func.is_enabled ? 1 : 0) : 1;
          ecuFunctionVisible.value = true;
        }

        async function createEcuFunction() {
          const path = editingFunctionId.value ? `/api/v1/admin/ecu-rules/function/${editingFunctionId.value}` : '/api/v1/admin/ecu-rules/function';
          const method = editingFunctionId.value ? 'PUT' : 'POST';
          await request(path, {
            method,
            body: JSON.stringify({
              ecu_model_id: Number(ecuFunctionForm.ecu_model_id),
              name: ecuFunctionForm.name,
              success_msg: ecuFunctionForm.success_msg,
              sort_order: Number(ecuFunctionForm.sort_order || 0),
              is_enabled: Number(ecuFunctionForm.is_enabled || 1),
            }),
          });
          Message.success(editingFunctionId.value ? '功能已更新' : '功能已新增');
          ecuFunctionVisible.value = false;
          editingFunctionId.value = null;
          ecuFunctionForm.name = '';
          ecuFunctionForm.success_msg = '';
          ecuFunctionForm.sort_order = 0;
          await Promise.all([loadEcuRules(), loadEcuRuleDetail(ecuFunctionForm.ecu_model_id), loadLogs()]);
        }

        function prepareVariantForm(func) {
          ecuVariantForm.function_id = func.id;
          ecuVariantForm.identify_hex = '';
          ecuVariantVisible.value = true;
          Message.info(`已选中功能：${func.name}`);
        }

        function preparePatchForm(variant, patch = null) {
          editingPatchId.value = patch ? patch.id : null;
          ecuPatchForm.variant_id = variant.id;
          ecuPatchForm.seq_no = patch ? patch.seq_no : (((variant.patches || []).length || 0) + 1);
          ecuPatchForm.addr = patch ? patch.addr : '';
          ecuPatchForm.data_length = patch ? patch.data_length : '';
          ecuPatchForm.value_hex = patch ? patch.value_hex : '';
          ecuPatchVisible.value = true;
          Message.info(patch ? '已选中补丁，可直接编辑' : '已选中功能变体，可直接新增补丁');
        }

        async function createVariant() {
          await request('/api/v1/admin/ecu-rules/variant', {
            method: 'POST',
            body: JSON.stringify({
              function_id: Number(ecuVariantForm.function_id),
              identify_hex: normalizeHexText(ecuVariantForm.identify_hex),
            }),
          });
          Message.success('功能变体已新增');
          const currentId = selectedEcuRule.value && selectedEcuRule.value.id;
          ecuVariantVisible.value = false;
          ecuVariantForm.identify_hex = '';
          if (currentId) await Promise.all([loadEcuRuleDetail(currentId), loadLogs()]);
        }

        async function createPatch() {
          const path = editingPatchId.value ? `/api/v1/admin/ecu-rules/patch/${editingPatchId.value}` : '/api/v1/admin/ecu-rules/patch';
          const method = editingPatchId.value ? 'PUT' : 'POST';
          await request(path, {
            method,
            body: JSON.stringify({
              variant_id: Number(ecuPatchForm.variant_id),
              seq_no: Number(ecuPatchForm.seq_no || 0),
              addr: parseNumericInput(ecuPatchForm.addr),
              data_length: Number(ecuPatchForm.data_length),
              value_hex: normalizeHexText(ecuPatchForm.value_hex),
            }),
          });
          Message.success(editingPatchId.value ? '补丁已更新' : '补丁已新增');
          const currentId = selectedEcuRule.value && selectedEcuRule.value.id;
          ecuPatchVisible.value = false;
          editingPatchId.value = null;
          ecuPatchForm.seq_no = 1;
          ecuPatchForm.addr = '';
          ecuPatchForm.data_length = '';
          ecuPatchForm.value_hex = '';
          if (currentId) await Promise.all([loadEcuRuleDetail(currentId), loadLogs()]);
        }

        async function deleteIdentifyRule(rule) {
          await request(`/api/v1/admin/ecu-rules/identify-rule/${rule.id}`, { method: 'DELETE' });
          Message.success('识别规则已删除');
          const currentId = selectedEcuRule.value && selectedEcuRule.value.id;
          if (currentId) await Promise.all([loadEcuRules(), loadEcuRuleDetail(currentId), loadLogs()]);
        }

        async function deleteVariant(variant) {
          await request(`/api/v1/admin/ecu-rules/variant/${variant.id}`, { method: 'DELETE' });
          Message.success('功能变体已删除');
          const currentId = selectedEcuRule.value && selectedEcuRule.value.id;
          if (currentId) await Promise.all([loadEcuRules(), loadEcuRuleDetail(currentId), loadLogs()]);
        }

        async function deletePatch(patch) {
          await request(`/api/v1/admin/ecu-rules/patch/${patch.id}`, { method: 'DELETE' });
          Message.success('补丁已删除');
          const currentId = selectedEcuRule.value && selectedEcuRule.value.id;
          if (currentId) await Promise.all([loadEcuRuleDetail(currentId), loadLogs()]);
        }

        async function loadAll() {
          await loadMe();
          await Promise.all([loadDashboard(), loadUsers(), loadLogs(), loadPurchaseConfig(), loadWiringGuides(), loadLearningArticles(), loadEcuRules()]);
        }

        async function createUser() {
          try {
            await request('/api/v1/admin/users', {
              method: 'POST',
              body: JSON.stringify(createForm),
            });
            Message.success('用户已创建');
            createVisible.value = false;
            createForm.phone = '';
            createForm.name = '';
            createForm.password = '';
            createForm.status = 'enabled';
            await loadUsers();
            await loadDashboard();
          } catch (err) {
            Message.error(err.message);
          }
        }

        async function toggleUser(user) {
          try {
            await request(`/api/v1/admin/users/${user.id}/toggle`, { method: 'POST' });
            Message.success('状态已更新');
            await loadUsers();
            await loadDashboard();
          } catch (err) {
            Message.error(err.message);
          }
        }

        async function approveUser(user) {
          try {
            await request(`/api/v1/admin/users/${user.id}/approve`, { method: 'POST' });
            Message.success('用户已审批通过');
            await Promise.all([loadUsers(), loadDashboard(), loadLogs()]);
          } catch (err) {
            Message.error(err.message);
          }
        }

        async function rejectUser(user) {
          try {
            await request(`/api/v1/admin/users/${user.id}/reject`, {
              method: 'POST',
              body: JSON.stringify({ reason: '资料未通过审核' }),
            });
            Message.success('用户已驳回');
            await Promise.all([loadUsers(), loadDashboard(), loadLogs()]);
          } catch (err) {
            Message.error(err.message);
          }
        }

        async function unbindUserDevice(user) {
          try {
            await request(`/api/v1/admin/users/${user.id}/unbind-device`, { method: 'POST' });
            Message.success('设备已解绑');
            await Promise.all([loadUsers(), loadDashboard(), loadLogs()]);
          } catch (err) {
            Message.error(err.message);
          }
        }

        async function deleteUser(user) {
          try {
            await request(`/api/v1/admin/users/${user.id}`, { method: 'DELETE' });
            Message.success('用户已删除');
            await Promise.all([loadUsers(), loadDashboard(), loadLogs()]);
          } catch (err) {
            Message.error(err.message);
          }
        }

        function openAuthUser(user) {
          authUser.value = user;
          authForm.auth_days = 365;
          authUserVisible.value = true;
        }

        async function saveUserAuth() {
          if (!authUser.value) return;
          try {
            await request(`/api/v1/admin/users/${authUser.value.id}/auth`, {
              method: 'POST',
              body: JSON.stringify({ auth_days: Number(authForm.auth_days || 365) }),
            });
            Message.success('授权时间已保存');
            authUserVisible.value = false;
            authUser.value = null;
            await Promise.all([loadUsers(), loadDashboard(), loadLogs()]);
          } catch (err) {
            Message.error(err.message);
          }
        }

        function openResetPassword(user) {
          resetPasswordUser.value = user;
          resetPasswordForm.password = '';
          resetPasswordVisible.value = true;
        }

          }
          if (!Array.isArray(data)) {
            throw new Error(label + ' 必须是列表');
          }
          for (const item of data) {
            if (typeof item !== 'object' || item === null) {
              throw new Error(label + ' 每一项都必须是对象');

          }
          return data;

        async function uploadManagedFile(option, target) {
          const formData = new FormData();
          formData.append('file', option.fileItem.file);
          try {
            const resp = await fetch('/api/v1/admin/files/upload', {
              method: 'POST',
              headers: { Authorization: headers.value.Authorization || '' },
              body: formData,
            });
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.detail || '上传失败');
            target.file_name = data.file_name || '';
            target.object_key = data.object_key || '';
            target.file_url = data.file_url || '';
            target.content_type = data.content_type || '';
            target.file_size = Number(data.file_size || 0);
            if ('preview_image_url' in target && !target.preview_image_url) {
              target.preview_image_url = data.preview_url || data.file_url || '';
            }
            if ('image_url' in target && !target.image_url) {
              target.image_url = data.preview_url || data.file_url || '';
            }
            if ('cover_image_url' in target && !target.cover_image_url) {
              target.cover_image_url = data.preview_url || data.file_url || '';
            }
            Message.success('文件上传成功');
            option.onSuccess(data);
          } catch (err) {
            Message.error(err.message || '上传失败');
            option.onError(err);
          }
        }

            const nextItem = {

              title: assetForm.title.trim(),
              category: assetForm.category || 'manual',
              summary: assetForm.summary || '',
              keywords: assetForm.keywords || '',
              image_url: assetForm.image_url || '',

              file_url: assetForm.file_url || '',
              content_type: assetForm.content_type || '',
              file_size: Number(assetForm.file_size || 0),
            };
            const index = virtualAssets.value.findIndex(item => String(item.id) === String(id));
            if (index >= 0) {
              virtualAssets.value.splice(index, 1, nextItem);

              virtualAssets.value.unshift(nextItem);

            virtualAssets.value = [...virtualAssets.value].sort((a, b) => Number(a.sort_order || 0) - Number(b.sort_order || 0));

              <a-form layout="vertical">
                <a-form-item label="新密码">
                  <a-input-password v-model="resetPasswordForm.password" placeholder="请输入新密码" />
                </a-form-item>
              </a-form>
            </a-modal>

            <a-modal v-model:visible="authUserVisible" :title="'设置授权 - ' + (authUser ? authUser.name : '')" @ok="saveUserAuth">
              <a-form layout="vertical">
                <a-form-item label="授权时长">
                  <a-select v-model="authForm.auth_days">
                    <a-option :value="365">365天</a-option>
                    <a-option :value="3650">3650天</a-option>
                  </a-select>
                </a-form-item>
                <div class="muted">保存后该用户登录端会显示已授权，到期后仅保留免费项目可用。</div>
              </a-form>
            </a-modal>

            <a-modal v-model:visible="assetVisible" :title="assetForm.id ? '编辑资料' : '新增资料'" :confirm-loading="assetSubmitting" @ok="saveAsset" width="760px">
              <a-form layout="vertical">
                <a-form-item label="资料名称"><a-input v-model="assetForm.title" placeholder="例如：基础资料包 / 说明文档" /></a-form-item>
                <a-grid :cols="2" :col-gap="12">
                  <a-grid-item>
                    <a-form-item label="资料类型">
                      <a-select v-model="assetForm.category">
                        <a-option value="manual">说明文档</a-option>
                        <a-option value="package">资料包</a-option>
                        <a-option value="image">图片</a-option>
                        <a-option value="other">其他</a-option>
                      </a-select>
                    </a-form-item>
                  </a-grid-item>
                  <a-grid-item>
                    <a-form-item label="按钮文案"><a-input v-model="assetForm.download_text" placeholder="例如：立即下载 / 下载资料包" /></a-form-item>
                  </a-grid-item>
                </a-grid>
                <a-form-item label="资料说明"><a-textarea v-model="assetForm.summary" :auto-size="{ minRows: 3, maxRows: 6 }" /></a-form-item>
                <a-form-item label="适配关键词"><a-input v-model="assetForm.keywords" placeholder="例如：ME7.8.8, EA211, 朗逸" /></a-form-item>
                <div style="display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px;">
                  <div class="preview-box">
                    <img v-if="assetForm.image_url" :src="assetForm.image_url" alt="资料封面" />
                    <div v-else class="preview-hint">可上传封面，未上传则按文件类型自动展示</div>
                  </div>
                  <div style="flex:1;min-width:220px;display:grid;gap:12px;">
                    <a-form-item label="上传资料文件">
                      <a-upload :custom-request="uploadAssetFile" :show-file-list="false">
                        <template #upload-button>
                          <a-button type="outline">选择资料文件</a-button>
                        </template>
                      </a-upload>
                    </a-form-item>
                    <a-form-item label="封面图地址"><a-input v-model="assetForm.image_url" placeholder="上传图片资料后会自动回填，可按需调整" /></a-form-item>
                    <div class="muted">当前文件：{{ assetForm.file_name || '未上传' }} · {{ assetForm.file_size || 0 }} bytes</div>
                  </div>
                </div>
                <a-grid :cols="2" :col-gap="12">
                  <a-grid-item>
                    <a-form-item label="排序"><a-input-number v-model="assetForm.sort_order" :min="0" /></a-form-item>
                  </a-grid-item>
                  <a-grid-item>
                    <a-form-item label="状态">
                      <a-select v-model="assetForm.is_enabled">
                        <a-option :value="1">启用</a-option>
                        <a-option :value="0">停用</a-option>
                      </a-select>
                    </a-form-item>
                  </a-grid-item>
                </a-grid>
              </a-form>
            </a-modal>

            <a-modal v-model:visible="wiringGuideVisible" :title="wiringGuideForm.id ? '编辑接线图' : '新增接线图'" :confirm-loading="wiringGuideSubmitting" @ok="saveWiringGuide" width="760px">
              <a-form layout="vertical">
                <a-form-item label="资源名称"><a-input v-model="wiringGuideForm.name" placeholder="例如：ME7.8.8 接线图" /></a-form-item>
                <a-grid :cols="2" :col-gap="12">
                  <a-grid-item>
                    <a-form-item label="ECU 型号"><a-input v-model="wiringGuideForm.model" placeholder="ME7.8.8 / 1234 / 12345" /></a-form-item>
                  </a-grid-item>
                  <a-grid-item>
                    <a-form-item label="车型"><a-input v-model="wiringGuideForm.car_model" placeholder="可选" /></a-form-item>
                  </a-grid-item>
                </a-grid>
                <a-form-item label="关键词"><a-input v-model="wiringGuideForm.keywords" placeholder="支持模糊搜索，例如 EA211, 朗逸, BOSCH" /></a-form-item>
                <a-form-item label="资料说明"><a-textarea v-model="wiringGuideForm.description" :auto-size="{ minRows: 3, maxRows: 6 }" /></a-form-item>
                <div style="display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px;">
                  <div class="preview-box">
                    <img v-if="wiringGuideForm.preview_image_url" :src="wiringGuideForm.preview_image_url" alt="接线图预览" />
                    <div v-else class="preview-hint">可选封面，仅后台管理预览使用</div>
                  </div>
                  <div style="flex:1;min-width:220px;display:grid;gap:12px;">
                    <a-form-item label="上传接线图文件">
                      <a-upload :custom-request="uploadWiringGuideFile" :show-file-list="false">
                        <template #upload-button>
                          <a-button type="outline">选择接线图文件</a-button>
                        </template>
                      </a-upload>
                    </a-form-item>
                    <a-form-item label="预览图地址"><a-input v-model="wiringGuideForm.preview_image_url" placeholder="可留空" /></a-form-item>
                    <div class="muted">当前文件：{{ wiringGuideForm.file_name || '未上传' }} · {{ wiringGuideForm.file_size || 0 }} bytes</div>
                  </div>
                </div>
                <a-grid :cols="2" :col-gap="12">
                  <a-grid-item>
                    <a-form-item label="排序"><a-input-number v-model="wiringGuideForm.sort_order" :min="0" /></a-form-item>
                  </a-grid-item>
                  <a-grid-item>
                    <a-form-item label="状态">
                      <a-select v-model="wiringGuideForm.is_enabled">
                        <a-option :value="1">启用</a-option>
                        <a-option :value="0">停用</a-option>
                      </a-select>
                    </a-form-item>
                  </a-grid-item>
                </a-grid>
              </a-form>
            </a-modal>

            <a-modal v-model:visible="learningArticleVisible" :title="learningArticleForm.id ? '编辑学习资料' : '新增学习资料'" :confirm-loading="learningArticleSubmitting" @ok="saveLearningArticle" width="900px">
              <a-form layout="vertical">
                <a-form-item label="标题"><a-input v-model="learningArticleForm.title" placeholder="例如：Bosch ECU 拆装与学习说明" /></a-form-item>
                <a-form-item label="摘要"><a-textarea v-model="learningArticleForm.summary" :auto-size="{ minRows: 2, maxRows: 4 }" /></a-form-item>
                <div style="display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px;">
                  <div class="preview-box">
                    <img v-if="learningArticleForm.cover_image_url" :src="learningArticleForm.cover_image_url" alt="学习资料封面" />
                    <div v-else class="preview-hint">可上传文章封面</div>
                  </div>
                  <div style="flex:1;min-width:220px;display:grid;gap:12px;">
                    <a-form-item label="上传封面">
                      <a-upload :custom-request="uploadLearningArticleCover" :show-file-list="false">
                        <template #upload-button>
                          <a-button type="outline">选择封面图片</a-button>
                        </template>
                      </a-upload>
                    </a-form-item>
                    <a-form-item label="封面地址"><a-input v-model="learningArticleForm.cover_image_url" placeholder="可自动回填" /></a-form-item>
                  </div>
                </div>
                <a-form-item label="图文内容">
                  <div style="display:grid;gap:10px;">
                    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
                      <a-upload :custom-request="uploadLearningArticleImage" :show-file-list="false">
                        <template #upload-button>
                          <a-button type="primary" :loading="learningArticleImageUploading">上传正文图片</a-button>
                        </template>
                      </a-upload>
                      <a-button type="outline" @click="insertLearningArticleParagraph">插入正文段落</a-button>
                      <span style="color:#86909c;font-size:12px;">上传图片后会自动插入正文，无需手写代码</span>
                    </div>
                    <a-textarea v-model="learningArticleForm.content_html" :auto-size="{ minRows: 12, maxRows: 20 }" placeholder="可直接输入正文内容，也可先点上方按钮插入图片和段落" />
                  </div>
                </a-form-item>
                <a-grid :cols="2" :col-gap="12">
                  <a-grid-item>
                    <a-form-item label="排序"><a-input-number v-model="learningArticleForm.sort_order" :min="0" /></a-form-item>
                  </a-grid-item>
                  <a-grid-item>
                    <a-form-item label="状态">
                      <a-select v-model="learningArticleForm.is_enabled">
                        <a-option :value="1">启用</a-option>
                        <a-option :value="0">停用</a-option>
                      </a-select>
                    </a-form-item>
                  </a-grid-item>
                </a-grid>
              </a-form>
            </a-modal>
          </main>
        </div>
      `
    }).use(ArcoVue).mount('#app');
  </script>
</body>
</html>
